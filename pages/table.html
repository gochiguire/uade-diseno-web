<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tabla de ejemplo de HTML</title>
        <link rel="stylesheet" href="estilos.css">
    </head>
    <body>
        <center>
            <section class="clear-section">
                <table class="task-table">
                    <tr>
                        <th colspan="3">
                            <h1 class="table-main-header"><img src="iconos/tarea.png" alt="icono de tarea" height="24px"> Tareas</h1>
                        </th>
                    </tr>
                    <tr>
                        <th class="to-start-header cell-header">Sin arrancar</th>
                        <th class="in-progress-header cell-header">En progreso</th>
                        <th class="completed-header cell-header">Completado</th>
                    </tr>
                    <tr>
                        <td class="to-start-data cell-data"><img src="iconos/cheque.png" width="12px"> Armar resumen de la primera clase de Sistemas 2</td>
                        <td class="in-progress cell-data" rowspan="3"><img src="iconos/cheque.png" width="12px"> Armar table.html</td>
                        <td class="completed-data cell-data"><img src="iconos/cheque.png" width="12px"> Sacar a pasear al perro</td>
                    </tr>
                    <tr>
                        <td class="to-start-data cell-data"><img src="iconos/cheque.png" width="12px"> Lavar ropa</td>
                        <td class="completed-data cell-data"><img src="iconos/cheque.png" width="12px"> Recargar sube</td>
                    </tr>
                    <tr>
                        <td class="to-start-data cell-data"><img src="iconos/cheque.png" width="12px"> Llamar a la cerrajeria por la copia</td>
                        <td class="completed-data cell-data"><img src="iconos/cheque.png" width="12px"> Agendar cita con nutricionista</td>
                    </tr>
                </table>
                <section class="back-button-crazy">
                    <a href="index.html"><button>Volver</button></a>
                </section>  
            </section>
        </center>
    </body>
</html>
